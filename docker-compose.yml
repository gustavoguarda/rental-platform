services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: rental_platform
      DB_USERNAME: platform
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan queue:work --queue=default,channel-sync --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: rental_platform
      DB_USERNAME: platform
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - nginx

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rental_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
